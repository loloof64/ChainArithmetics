# appimage-builder recipe see https://appimage-builder.readthedocs.io for details
version: 1
script:
  - rm -rf AppDir || true
  - cp -r build/linux/x64/release/bundle AppDir
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps/
  - cp icon.png AppDir/usr/share/icons/hicolor/256x256/apps/
  - mkdir -p AppDir/usr/share/applications/
  - cp ChainArithmetics.desktop AppDir/usr/share/applications/
  - mkdir -p AppDir/usr/share/metainfo
  - cp ChainArithmetics.metainfo.xml AppDir/usr/share/metainfo/ChainArithmetics.metainfo.xml
  # Regenerate gdk-pixbuf loaders cache for SVG support
  - |
    if [ -d AppDir/usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0/2.10.0/loaders ]; then
      gdk-pixbuf-query-loaders AppDir/usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0/2.10.0/loaders/*.so > AppDir/usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0/2.10.0/loaders.cache
    fi
AppDir:
  path: ./AppDir
  app_info:
    id: com.loloof64.ChainArithmetics
    name: Chain Arithmetics
    icon: icon
    version: 1.0.7
    exec: chain_arithmetics
    exec_args: $@
  apt:
    arch: amd64
    allow_unauthenticated: true
    sources:
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ jammy main restricted
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ jammy-updates main restricted
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ jammy universe
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ jammy-updates universe
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ jammy multiverse
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ jammy-updates multiverse
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ jammy-backports main restricted universe multiverse
      - sourceline: deb http://security.ubuntu.com/ubuntu jammy-security main restricted
      - sourceline: deb http://security.ubuntu.com/ubuntu jammy-security universe
      - sourceline: deb http://security.ubuntu.com/ubuntu jammy-security multiverse
    include:
      - libgtk-3-0
      - libudev1
      - libgudev-1.0-0
      - gdk-pixbuf2.0
      - librsvg2-common
      - libunwind8
      - libgstreamer1.0-0
      - libgstreamer-plugins-base1.0-0
      - gstreamer1.0-plugins-base
      - gstreamer1.0-plugins-good
      - libxkbcommon0
      - libxcb1
      - libx11-xcb1
    exclude:
      - humanity-icon-theme
      - hicolor-icon-theme
      - adwaita-icon-theme
      - ubuntu-mono
      - libwebkit2gtk-4.1
      - libegl1
      - libegl-mesa0
      - libgl1
      - libglx-mesa0
      - libglvnd0
      - libgles2
  files:
    exclude:
      - usr/share/man
      - usr/share/doc/*/README.*
      - usr/share/doc/*/changelog.*
      - usr/share/doc/*/NEWS.*
      - usr/share/doc/*/TODO.*
  runtime:
    env:
      GDK_BACKEND: x11
      GTK_MODULES: ""
  test:
    fedora:
      image: appimagecrafters/tests-env:fedora-30
      command: ./AppRun
      use_host_x: true
    debian:
      image: appimagecrafters/tests-env:debian-stable
      command: ./AppRun
      use_host_x: true
    arch:
      image: appimagecrafters/tests-env:archlinux-latest
      command: ./AppRun
      use_host_x: true
    centos:
      image: appimagecrafters/tests-env:centos-7
      command: ./AppRun
      use_host_x: true
    ubuntu:
      image: appimagecrafters/tests-env:ubuntu-jammy
      command: ./AppRun
      use_host_x: true
AppImage:
  arch: x86_64
  update-information: guess
  sign-key: None
