name: AppImage Release

on:
  workflow_call:

jobs:
  build:
    name: Build
    runs-on: Ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: latest
      - run: flutter upgrade
      - run: flutter config --enable-linux-desktop
      - name: "Install dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential pkg-config curl file git unzip xz-utils zip libgtk-3-dev libudev-dev libgudev-1.0-dev gdk-pixbuf2.0 librsvg2-common libunwind-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libegl1 libegl-mesa0 libgl1 libglx-mesa0 libxkbcommon0 libxcb1 libx11-xcb1
      - name: Build flutter app
        run: flutter build linux --release
      - name: Build AppImage using appimage-builder
        uses: docker://appimagecrafters/appimage-builder:latest
        with:
          entrypoint: appimage-builder
          args: --recipe ./AppImageBuilder.yml --skip-test
      - name: Save build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChainArithmetics-${{ github.ref_name }}-x86_64.AppImage
          path: "./*.AppImage*"
